<!doctype html>
<html lang="en">
  <head>
    <title>makeup-keyboard-trap demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../../docs.css" />
    <style>
      #trap {
        border: 1px dashed #ccc;
        padding: 1rem;
      }
      #trap.keyboard-trap--active {
        background-color: #eee;
        border-style: solid;
      }
    </style>
  </head>
  <body>
    <main>
      <h1><a href="../">core</a> / makeup-keyboard-trap</h1>
      <p>Restricts keyboard tab focus to a single subtree in the DOM.</p>

      <hr />

      <h2>Tab trap</h2>
      <p>
        Tab through the page. Click <strong>Trap</strong> to activate — focus will be locked inside the bordered area.
        Hidden links inside the trap are ignored.
      </p>
      <input aria-label="Input before trap" placeholder="Input before trap" />
      <div id="trap">
        <a href="#" hidden>hidden link</a>
        <a href="#">Link A</a>
        <button aria-pressed="false" id="toggle">Trap</button>
        <a href="#">Link B</a>
        <a href="#" hidden>hidden link</a>
      </div>
      <input aria-label="Input after trap" placeholder="Input after trap" />

      <hr />

      <h2>Events</h2>
      <ul id="log" class="demo-output"></ul>
      <button type="button" id="clear">Clear</button>
    </main>
    <script src="index.min.js"></script>
  </body>
</html>
