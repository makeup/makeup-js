<!doctype html>
<html lang="en">
  <head>
    <title>makeup-modal demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../../docs.css" />
    <style>
      header,
      body > .modal {
        margin: 0 auto;
        max-width: 960px;
      }
      header {
        margin-bottom: 1rem;
      }
      main {
        margin-top: 1rem;
      }
      header > div {
        margin-bottom: 0.5rem;
      }
      .modal {
        border: 1px dashed grey;
        margin-bottom: 1rem;
        padding: 1em;
      }
      /* when modal is active */
      [data-makeup-modal="widget"] {
        border-color: royalblue;
        border-style: solid;
      }
      /* inert container created by wrap — preserve layout and dim content */
      [data-makeup-modal="inert"] {
        margin: 0 auto;
        max-width: 960px;
        opacity: 0.4;
      }
      /* placeholder left behind when modal is hoisted */
      [data-makeup-modal="placeholder"] {
        border: 1px dashed #ccc;
        margin-bottom: 1rem;
        min-height: 3em;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="../">core</a> / makeup-modal</h1>
      <p>Restricts keyboard and screen reader access to a single element. All other content becomes inert.</p>
      <div>
        <label><input id="hoist-checkbox" type="checkbox" /> hoist</label>
        <label><input id="wrap-checkbox" type="checkbox" /> wrap</label>
        <label><input id="hidden-checkbox" type="checkbox" /> useHiddenProperty</label>
      </div>
    </header>

    <div class="modal" id="modal-1">
      <p>Modal 1 — root level</p>
      <a href="#">link</a>
      <input type="text" placeholder="textbox" />
      <a href="#">link</a>
      <button class="toggle-btn" aria-pressed="false">Modal</button>
    </div>

    <main>
      <div>
        <div>
          <div class="modal" id="modal-2">
            <p>Modal 2 — shallow nest</p>
            <a href="#">link</a>
            <input type="text" placeholder="textbox" />
            <a href="#">link</a>
            <button class="toggle-btn" aria-pressed="false">Modal</button>
          </div>
        </div>
      </div>

      <div>
        <div>
          <div>
            <div>
              <div>
                <div>
                  <div>
                    <div>
                      <div>
                        <div>
                          <div class="modal" id="modal-3">
                            <p>Modal 3 — deep nest (10 levels)</p>
                            <a href="#">link</a>
                            <input type="text" placeholder="textbox" />
                            <a href="#">link</a>
                            <button class="toggle-btn" aria-pressed="false">Modal</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <h2>Events</h2>
      <ul id="log" class="demo-output"></ul>
      <button type="button" id="clear">Clear</button>
    </main>

    <script src="index.min.js"></script>
  </body>
</html>
